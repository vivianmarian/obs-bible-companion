<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBS Bible Companion</title>
  <link rel="stylesheet" href="css/styles.css" />

<body>

  <!-- ======================================================================
       OBS Bible Companion — Custom Browser Dock
       Load this file via: OBS → View → Docks → Custom Browser Docks
       DO NOT load as a Browser Source — it must stay alive across scene changes.
       ====================================================================== -->

  <div id="app">

    <div id="header">
      <h1>OBS Bible Companion</h1>
      <div id="translation-controls">
        <label for="translation-select">Translation:</label>
        <select id="translation-select"></select>
      </div>
    </div>

    <div id="search-section">
      <input
        type="text"
        id="search-input"
        placeholder="Search (e.g. John 3:16 or 'God so loved')"
        autocomplete="off"
      />
      <button id="search-btn">Search</button>
    </div>

    <div id="results-section">
      <ul id="results-list"></ul>
    </div>

    <div id="current-verse-section">
      <div id="current-reference"></div>
      <div id="current-text"></div>
      <div id="nav-controls">
        <button id="prev-btn" title="Previous verse">&larr; Prev</button>
        <button id="overlay-btn">Show</button>
        <button id="next-btn" title="Next verse">Next &rarr;</button>
      </div>
    </div>

    <div id="status-bar">
      <span id="companion-status">Companion: disconnected</span>
    </div>

  </div>

  <!-- ==================================================================
       APPLICATION SCRIPTS
       All plain <script> tags — no type="module", no import statements.
       OBS CEF blocks ES6 imports on file:// URLs (Decision 14).
       ================================================================== -->

  <script>
    // -----------------------------------------------------------------------
    // Translation management
    // -----------------------------------------------------------------------

    var currentTranslation = (function () {
      try {
        return localStorage.getItem('obs_bible_companion_translation') || 'KJV'
      } catch (_) {
        return 'KJV'
      }
    }())

    // Expose for companion_bridge.js to read.
    window.__currentTranslation = currentTranslation

    function setTranslation (name) {
      if (!BIBLE_TRANSLATIONS[name]) {
        console.warn('[OBS Bible] Unknown translation: ' + name)
        return
      }
      currentTranslation = name
      window.__currentTranslation = name
      try {
        localStorage.setItem('obs_bible_companion_translation', name)
      } catch (_) {}
      populateTranslationSelect()
    }

    function populateTranslationSelect () {
      var sel = document.getElementById('translation-select')
      if (!sel) return
      sel.innerHTML = ''
      Object.keys(BIBLE_TRANSLATIONS).forEach(function (name) {
        var opt = document.createElement('option')
        opt.value = name
        opt.textContent = name
        if (name === currentTranslation) opt.selected = true
        sel.appendChild(opt)
      })
    }

    // Public API used by companion_bridge.js
    window.changeTranslation = function (name) {
      setTranslation(name)
    }
  </script>

  <script>
    // -----------------------------------------------------------------------
    // Search
    // -----------------------------------------------------------------------

    function getBibleData () {
      return BIBLE_TRANSLATIONS[currentTranslation] || []
    }

    function searchVerses (query) {
      var data  = getBibleData()
      var q     = query.trim().toLowerCase()
      if (!q) return []

      // Try exact reference match first (e.g. "John 3:16")
      var refMatch = data.filter(function (v) {
        return v.name.toLowerCase() === q
      })
      if (refMatch.length > 0) return refMatch

      // Full-text search
      return data.filter(function (v) {
        return v.name.toLowerCase().indexOf(q) !== -1 ||
               v.verse.toLowerCase().indexOf(q) !== -1
      }).slice(0, 50)
    }

    function renderResults (results) {
      var list = document.getElementById('results-list')
      if (!list) return
      list.innerHTML = ''
      if (results.length === 0) {
        var li = document.createElement('li')
        li.className = 'no-results'
        li.textContent = 'No results found.'
        list.appendChild(li)
        return
      }
      results.forEach(function (v) {
        var li = document.createElement('li')
        li.className = 'result-item'
        li.innerHTML = '<strong>' + v.name + '</strong> ' + v.verse
        li.addEventListener('click', function () {
          displayVerseByReference(v.name)
        })
        list.appendChild(li)
      })
    }

    document.addEventListener('DOMContentLoaded', function () {
      var btn   = document.getElementById('search-btn')
      var input = document.getElementById('search-input')
      if (btn && input) {
        btn.addEventListener('click', function () {
          renderResults(searchVerses(input.value))
        })
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') renderResults(searchVerses(input.value))
        })
      }
    })
  </script>

  <script>
    // -----------------------------------------------------------------------
    // Display — exposes window.displayVerseByReference, nextVerse, previousVerse
    // These are called by companion_bridge.js when Companion sends commands.
    // They update the dock UI and broadcast to browser_source.html.
    // -----------------------------------------------------------------------

    // BroadcastChannel names — must match browser_source.html exactly (Decision 15).
    var displayChannel = new BroadcastChannel('obs-bible-companion-display')
    var animChannel    = new BroadcastChannel('obs-bible-companion-anim')

    // Track current position.
    window.__currentReference  = null
    window.__currentVerseIndex = -1
    window.__overlayVisible    = false

    function findVerseIndex (reference) {
      var data = getBibleData()
      var ref  = reference.toLowerCase()
      for (var i = 0; i < data.length; i++) {
        if (data[i].name.toLowerCase() === ref) return i
      }
      return -1
    }

    function applyVerse (idx) {
      var data = getBibleData()
      if (idx < 0 || idx >= data.length) return
      var v = data[idx]

      window.__currentVerseIndex = idx
      window.__currentReference  = v.name

      // Update dock UI
      var refEl  = document.getElementById('current-reference')
      var textEl = document.getElementById('current-text')
      if (refEl)  refEl.textContent  = v.name
      if (textEl) textEl.textContent = v.verse

      // Broadcast to browser_source.html
      displayChannel.postMessage({ reference: v.name, verse: v.verse })
    }

    window.displayVerseByReference = function (reference) {
      var idx = findVerseIndex(reference)
      if (idx === -1) {
        console.warn('[OBS Bible] Reference not found: ' + reference)
        return
      }
      applyVerse(idx)
    }

    window.nextVerse = function () {
      var data = getBibleData()
      var next = window.__currentVerseIndex + 1
      if (next < data.length) applyVerse(next)
    }

    window.previousVerse = function () {
      var prev = window.__currentVerseIndex - 1
      if (prev >= 0) applyVerse(prev)
    }

    window.showOverlay = function () {
      window.__overlayVisible = true
      animChannel.postMessage({ action: 'show' })
      var btn = document.getElementById('overlay-btn')
      if (btn) btn.textContent = 'Hide'
    }

    window.hideOverlay = function () {
      window.__overlayVisible = false
      animChannel.postMessage({ action: 'hide' })
      var btn = document.getElementById('overlay-btn')
      if (btn) btn.textContent = 'Show'
    }

    // Wire up nav buttons once DOM is ready
    document.addEventListener('DOMContentLoaded', function () {
      var prevBtn    = document.getElementById('prev-btn')
      var nextBtn    = document.getElementById('next-btn')
      var overlayBtn = document.getElementById('overlay-btn')

      if (prevBtn)    prevBtn.addEventListener('click', window.previousVerse)
      if (nextBtn)    nextBtn.addEventListener('click', window.nextVerse)
      if (overlayBtn) overlayBtn.addEventListener('click', function () {
        if (window.__overlayVisible) window.hideOverlay()
        else window.showOverlay()
      })

      populateTranslationSelect()
      document.getElementById('translation-select')
        .addEventListener('change', function (e) {
          setTranslation(e.target.value)
        })
    })
  </script>

  <!-- ==================================================================
       COMPANION BRIDGE

       bridge tries to call them. Connects to RelayServer, receives
       commands from Companion, reports state back.
       ================================================================== -->
  <script src="js/companion_bridge.js"></script>
