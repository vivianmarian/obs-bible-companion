<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS Bible — Display</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      background: transparent !important;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="display-root" id="displayRoot">
    <div class="verse-card" id="verseCard">
      <div class="verse-card__text" id="verseText"></div>
      <div class="verse-card__ref"  id="verseRef"></div>
    </div>
  </div>

  <script>
    'use strict'

    var displayRoot = document.getElementById('displayRoot')
    var verseText   = document.getElementById('verseText')
    var verseRef    = document.getElementById('verseRef')
    var verseCard   = document.getElementById('verseCard')

    // Unique channel names — avoids collision with the original OBS Bible plugin
    // which uses 'myChannel' and 'obs-bible-animation'
    var displayChannel = new BroadcastChannel('obs-bible-companion-display')
    var animChannel    = new BroadcastChannel('obs-bible-companion-anim')

    displayChannel.addEventListener('message', function (event) {
      var data = event.data
      if (!data || typeof data.verse !== 'string') return
      verseText.textContent = data.verse
      verseRef.textContent  = data.reference || ''
      verseCard.style.animation = 'none'
      void verseCard.offsetWidth
      verseCard.style.animation = ''
    })

    animChannel.addEventListener('message', function (event) {
      var data = event.data

      if (!data || typeof data.action !== 'string') return

      if (data.action === 'show') {
      displayRoot.style.display = 'flex'
      }

      if (data.action === 'hide') {
      displayRoot.style.display = 'none'
      }
    })
  </script>
</body>
</html>
